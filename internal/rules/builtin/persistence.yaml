id: grub-script-cradle
title: "GRUB script (/etc/grub.d) contains a download cradle or reverse shell"
category: persistence
severity: critical
score: 90
mitre: ["T1542.001", "T1037"]
# /etc/grub.d scripts run as root during every grub-mkconfig and initiate
# boot-time execution. A download cradle or reverse shell embedded here survives
# a reboot and runs before most defenses are loaded.
foreach: startup_scripts
when: >
  item.path.startsWith("/etc/grub.d/") &&
  item.suspicious_lines.size() > 0
evidence:
  path: item.path
  lines: item.suspicious_lines
dedup: ["item.path"]

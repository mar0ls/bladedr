id: systemd-execstart-reverse-shell
title: "systemd ExecStart contains a reverse-shell / decode cradle"
category: persistence
severity: critical
score: 90
mitre: ["T1543.002"]
# A unit whose ExecStart embeds a reverse shell or in-line decode is a backdoor
# service. Markers are unambiguous (never in a legit ExecStart).
foreach: persistence.systemd_units
when: >
  item.exec_start.contains("/dev/tcp/") || item.exec_start.contains("bash -i") ||
  item.exec_start.contains("sh -i") || item.exec_start.contains("mkfifo") ||
  item.exec_start.contains("base64 -d") || item.exec_start.contains("base64 --decode")
evidence:
  name: item.name
  exec_start: item.exec_start
dedup: ["item.name"]
---
id: writable-persistence-file

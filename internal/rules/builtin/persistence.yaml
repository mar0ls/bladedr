id: systemd-timer-suspicious
title: "systemd timer activates a service from a writable path or a reverse shell"
category: persistence
severity: high
score: 80
mitre: ["T1053.006"]
# A .timer is systemd's cron. The collector pairs each timer with the ExecStart of
# the .service it activates; a timer whose target runs from /tmp,/dev/shm,/var/tmp,
# /home or embeds a reverse-shell/decode cradle is time-triggered persistence that
# the .service scan misses when the unit is timer-activated rather than enabled.
foreach: systemd_timers
when: >
  item.exec_start != "" && (
    item.exec_start.startsWith("/tmp/") || item.exec_start.startsWith("/dev/shm/") ||
    item.exec_start.startsWith("/var/tmp/") || item.exec_start.startsWith("/home/") ||
    item.exec_start.contains("/dev/tcp/") || item.exec_start.contains("bash -i") ||
    item.exec_start.contains("sh -i") || item.exec_start.contains("mkfifo") ||
    item.exec_start.contains("base64 -d") || item.exec_start.contains("base64 --decode")
  )
evidence:
  name: item.name
  unit: item.unit
  schedule: item.on_calendar
  exec_start: item.exec_start
dedup: ["item.name"]
---
id: dnf-plugin-writable
title: "dnf/yum plugin writable by a non-root user (runs as root on every transaction)"
category: persistence
severity: high
score: 80
mitre: ["T1546"]
# A dnf/yum plugin is Python that executes as root on every package transaction.
# A plugin file writable by a non-root user lets that user inject code that runs
# as root the next time dnf/yum runs — a root-executed persistence vector on
# RPM-based distros. The collector keeps only non-root-writable plugin files.
foreach: dnf_plugins
when: 'item.path != ""'
evidence:
  path: item.path
  plugin: item.plugin
dedup: ["item.path"]

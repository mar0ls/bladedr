     k.options.contains("/tmp/") || k.options.contains("mkfifo"))))
evidence:
  path: item.path
  owner: item.owner
  keys: 'item.keys.filter(k, k.options.contains("environment=") || k.options.contains("command="))'
dedup: ["item.path"]

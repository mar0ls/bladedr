id: package-manager-hook-backdoor
title: "Package-manager hook runs a cradle / writable-path command (apt/dpkg persistence)"
category: persistence
severity: high
score: 80
mitre: ["T1546.016"]
# APT/DPkg Pre-Invoke/Post-Invoke/Pre-Install-Pkgs run as root on every apt/dpkg
# run. The collector keeps only hooks whose command is a cradle or runs from a
# writable path, so legit hooks (unattended-upgrades, command-not-found) don't FP.
foreach: package_hooks
when: 'item.command != ""'
evidence:
  path: item.path
  directive: item.directive
  command: item.command
dedup: ["item.path", "item.command"]
---
id: modprobe-install-command
title: "modprobe.d install/remove runs an arbitrary command (kernel-module event persistence)"
category: persistence
severity: high
score: 80
mitre: ["T1546", "T1547.006"]
# `install <mod> <cmd>` / `remove <mod> <cmd>` in modprobe.d runs <cmd> as root
# when the module is (un)loaded; attackers point it at a payload instead of
# modprobe. The collector already drops /bin/true stubs and plain modprobe chains.
foreach: modprobe_commands
when: 'item.command != ""'
evidence:
  path: item.path
  directive: item.directive
  module: item.module
  command: item.command
dedup: ["item.path", "item.command"]
---
id: ld-so-conf-writable-path
title: "Library search path in ld.so.conf under a writable directory (linker hijack)"
category: evasion
severity: high
score: 80
mitre: ["T1574.006"]
# A writable dir on the system library search path lets an attacker's .so be
# loaded into every dynamically linked binary. Collector emits only writable dirs.
foreach: ld_so_conf
when: 'item.dir != ""'
evidence:
  path: item.path
  dir: item.dir
dedup: ["item.dir"]

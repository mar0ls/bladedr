id: systemd-exec-directive-writable
title: "systemd ExecStartPre/Post/Reload runs from a writable path"
category: persistence
severity: high
score: 75
mitre: ["T1543.002"]
# ExecStartPre/Post/Reload run as root around the main service but are not the
# ExecStart, so a payload there is missed by the ExecStart check. Writable-path only.
foreach: persistence.systemd_units
when: >
  item.exec_pre.contains("/tmp/") || item.exec_pre.contains("/dev/shm/") ||
  item.exec_pre.contains("/var/tmp/") || item.exec_pre.contains("/home/")
evidence:
  name: item.name
  exec_pre: item.exec_pre
dedup: ["item.name"]
---
id: systemd-unit-ld-preload
title: "systemd unit injects LD_PRELOAD/LD_AUDIT via Environment="
category: evasion
severity: critical
score: 90
mitre: ["T1574.006"]
# A unit Environment=LD_PRELOAD=/LD_AUDIT=... loads an attacker .so into that
# service — a per-service userland rootkit. Legit units don't set these.
foreach: persistence.systemd_units
when: 'item.environment.contains("LD_PRELOAD") || item.environment.contains("LD_AUDIT")'
evidence:
  name: item.name
  environment: item.environment
dedup: ["item.name"]

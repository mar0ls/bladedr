id: sudoers-dangerous-rule
title: "Dangerous sudoers grant (NOPASSWD: ALL, SETENV, or writable-path command)"
category: privilege
severity: high
score: 80
mitre: ["T1548.003"]
foreach: sudo_rules
when: >
  item.line.contains("NOPASSWD: ALL") || item.line.contains("NOPASSWD:ALL") ||
  item.line.contains("SETENV") ||
  item.line.contains("/tmp/") || item.line.contains("/dev/shm/")
evidence:
  path: item.path
  line: item.line
dedup: ["item.path", "item.line"]
---
id: nfs-no-root-squash
title: "NFS export with no_root_squash (remote root writes as local root)"
category: privilege
severity: high
score: 75
mitre: ["T1548"]
foreach: nfs_exports
when: 'item.contains("no_root_squash")'
evidence:
  export: item
dedup: ["item"]

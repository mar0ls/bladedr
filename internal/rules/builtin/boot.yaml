id: initramfs-hook-cradle
title: "initramfs/dracut hook contains a download cradle / reverse shell (boot persistence)"
category: persistence
severity: high
score: 80
mitre: ["T1542.001", "T1037"]
# A hook/script under /etc/initramfs-tools, /usr/share/initramfs-tools/hooks or a
# dracut config that runs a cradle/reverse-shell is baked into the initrd and runs
# as root at every boot (pre-disk). Distro dracut module trees are excluded upstream.
foreach: initramfs_hooks
when: 'item.suspicious_lines.size() > 0'
evidence:
  path: item.path
  lines: item.suspicious_lines
dedup: ["item.path"]

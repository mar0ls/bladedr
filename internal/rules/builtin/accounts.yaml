id: unexpected-uid0-account
title: "UID 0 account other than root (privilege backdoor)"
category: persistence
severity: critical
score: 85
mitre: ["T1136.001", "T1078.003"]
foreach: accounts
when: 'item.uid == 0 && item.name != "root"'
evidence:
  name: item.name
  shell: item.shell
  home: item.home
dedup: ["item.name"]
---
id: passwordless-account
title: "Account with an empty password (login without a password)"
category: credential
severity: critical
score: 85
mitre: ["T1098", "T1078"]
foreach: passwordless_accounts
when: 'item != ""'
evidence:
  account: item
dedup: ["item"]
---
id: service-account-in-privileged-group
title: "Service (nologin) account in a privileged group (sudo/wheel/docker)"
category: credential
severity: high
score: 80
mitre: ["T1098"]
foreach: priv_group_members
when: 'item.nologin == true'
evidence:
  group: item.group
  member: item.member
dedup: ["item.group", "item.member"]
---
id: login-shell-suspicious
title: "Account login shell is an interpreter or under a writable path (backdoor account)"
category: persistence
severity: high
score: 80
mitre: ["T1136.001", "T1078.003"]
# A login shell set to python/perl/etc. or to a binary under /tmp,/dev/shm,... gives
# interactive code execution on login. Real shells and nologin/false are not matched.
foreach: suspicious_shells
when: 'item != ""'
evidence:
  account: item
dedup: ["item"]
---
id: duplicate-uid-account
title: "Two accounts share the same UID (privilege escalation / account backdoor)"
category: persistence
severity: high
score: 80
mitre: ["T1136.001", "T1098"]
# An attacker creates a new account with the same UID as an existing user (or
# root) — both accounts share the same effective privileges. Catches any
# duplicate UID pair, not just UID 0.
foreach: accounts
when: >
  snapshot.accounts.exists(other,
    other.name != item.name && other.uid == item.uid)
evidence:
  name: item.name
  uid: item.uid
dedup: ["string(item.uid)", "item.name"]
